<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <title>Consultoría gratuita - Automanize</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFAB00",
                        "primary-hover": "#E69900",
                        "background-light": "#fcfcfb",
                        "background-dark": "#0a0a0a",
                        "surface-light": "#ffffff",
                        "surface-dark": "#141414",
                        "text-main": "#181811",
                        "text-muted": "#6b6b5f"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Spline Sans", sans-serif;
        }
    </style>
</head>

<body class="bg-background-light text-text-main overflow-x-hidden font-display">
    <div class="relative flex flex-col min-h-screen w-full">
        <header class="w-full border-b border-[#e6e6db] bg-background-light/90 backdrop-blur-md">
            <div class="px-4 md:px-10 py-4 flex items-center justify-between max-w-[1200px] mx-auto w-full">
                <a href="index.html#inicio-principal" class="flex items-center gap-3" aria-label="Ir al inicio principal">
                    <div class="size-10 rounded-lg flex items-center justify-center shadow-md overflow-hidden">
                        <img src="assets/images/Automanize%20(4).png" alt="Automanize Logo" class="w-full h-full object-cover" loading="lazy" />
                    </div>
                    <h1 class="text-text-main text-2xl font-bold tracking-tight">Automanize</h1>
                </a>
                <a href="index.html#inicio-principal" class="text-sm font-semibold hover:text-primary-hover transition-colors">Volver al inicio</a>
            </div>
        </header>

        <main class="flex-1 w-full max-w-[920px] mx-auto px-4 md:px-10 py-12 md:py-20">
            <section class="rounded-2xl border border-[#e6e6db] bg-surface-light p-6 md:p-10 shadow-sm">
                <div class="max-w-[760px] mx-auto text-center">
                    <p class="text-sm font-semibold uppercase tracking-wider text-primary mb-3">Paso 1 de 2</p>
                    <h2 class="text-3xl md:text-4xl font-black leading-tight">Ten tu consultoría totalmente gratuita</h2>
                    <p class="mt-4 text-text-muted text-lg">
                        Completa este formulario en 1 minuto y pasa al agendado de llamada.
                    </p>
                </div>

                <form id="lead-form" action="agendar-llamada.html" method="get" class="max-w-[760px] mx-auto mt-8 grid gap-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <label class="flex flex-col gap-2 text-left">
                            <span class="text-sm font-semibold text-text-main">Nombre</span>
                            <input type="text" name="nombre" required
                                autocomplete="name" maxlength="80"
                                pattern="[A-Za-zÀ-ÿÑñ' .-]{2,80}"
                                class="w-full rounded-xl border border-[#d9d9ce] bg-white px-4 py-3 text-text-main focus:border-primary focus:ring-primary"
                                placeholder="Tu nombre" />
                        </label>
                        <label class="flex flex-col gap-2 text-left">
                            <span class="text-sm font-semibold text-text-main">Email</span>
                            <input type="email" name="email" required
                                autocomplete="email" maxlength="120"
                                class="w-full rounded-xl border border-[#d9d9ce] bg-white px-4 py-3 text-text-main focus:border-primary focus:ring-primary"
                                placeholder="tu@email.com" />
                        </label>
                    </div>

                    <label class="flex flex-col gap-2 text-left">
                        <span class="text-sm font-semibold text-text-main">A qué te dedicas</span>
                        <input type="text" name="dedicacion" required
                            autocomplete="organization-title" maxlength="120"
                            pattern="[A-Za-zÀ-ÿÑñ0-9 .,()&+/_-]{2,120}"
                            class="w-full rounded-xl border border-[#d9d9ce] bg-white px-4 py-3 text-text-main focus:border-primary focus:ring-primary"
                            placeholder="Ej: ecommerce, asesoría, clínica, agencia..." />
                    </label>

                    <label class="flex flex-col gap-2 text-left">
                        <span class="text-sm font-semibold text-text-main">Problema a solucionar (opcional)</span>
                        <textarea name="problema" rows="4"
                            maxlength="500"
                            class="w-full rounded-xl border border-[#d9d9ce] bg-white px-4 py-3 text-text-main focus:border-primary focus:ring-primary"
                            placeholder="Cuéntanos qué quieres automatizar..."></textarea>
                        <span class="text-xs text-text-muted">
                            Si solamente quieres una consultoría general, no hace falta responder este campo.
                        </span>
                    </label>

                    <div class="pt-2 flex justify-center">
                        <button type="submit"
                            class="h-12 px-8 bg-primary hover:bg-primary-hover text-black text-base font-bold rounded-full transition-all hover:shadow-lg hover:-translate-y-1 shadow-orange-500/20">
                            Continuar para agendar llamada
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fields = ["nombre", "email", "dedicacion", "problema"];
        const blockedPattern = /(<|>|`|--|\/\*|\*\/|\b(select|insert|update|delete|drop|union|alter|create|truncate|exec|script)\b)/i;
        const sanitize = (value, maxLen = 300) => {
            if (!value) return "";
            return value.replace(/[\u0000-\u001F\u007F]/g, "").trim().slice(0, maxLen);
        };
        const isValidName = (value) => /^[A-Za-zÀ-ÿÑñ' .-]{2,80}$/.test(value);
        const isValidDedicacion = (value) => /^[A-Za-zÀ-ÿÑñ0-9 .,()&+/_-]{2,120}$/.test(value);
        const isSafeText = (value) => !blockedPattern.test(value);
        const maxLenByField = {
            nombre: 80,
            email: 120,
            dedicacion: 120,
            problema: 500
        };

        fields.forEach((fieldName) => {
            const value = sanitize(params.get(fieldName), maxLenByField[fieldName] || 300);
            const input = document.querySelector(`[name="${fieldName}"]`);
            if (value && input) input.value = value;
        });

        const form = document.getElementById("lead-form");
        if (form) {
            form.addEventListener("submit", (event) => {
                const nombreInput = form.querySelector('[name="nombre"]');
                const emailInput = form.querySelector('[name="email"]');
                const dedicacionInput = form.querySelector('[name="dedicacion"]');
                const problemaInput = form.querySelector('[name="problema"]');

                const nombre = sanitize(nombreInput.value, 80);
                const email = sanitize(emailInput.value, 120);
                const dedicacion = sanitize(dedicacionInput.value, 120);
                const problema = sanitize(problemaInput.value, 500);

                nombreInput.value = nombre;
                emailInput.value = email;
                dedicacionInput.value = dedicacion;
                problemaInput.value = problema;

                nombreInput.setCustomValidity("");
                dedicacionInput.setCustomValidity("");
                problemaInput.setCustomValidity("");

                if (!isValidName(nombre) || !isSafeText(nombre)) {
                    nombreInput.setCustomValidity("Introduce un nombre válido, sin símbolos o sentencias.");
                }
                if (!isValidDedicacion(dedicacion) || !isSafeText(dedicacion)) {
                    dedicacionInput.setCustomValidity("Introduce una dedicación válida, sin sentencias.");
                }
                if (problema && !isSafeText(problema)) {
                    problemaInput.setCustomValidity("El texto incluye contenido no permitido.");
                }

                if (!form.checkValidity()) {
                    event.preventDefault();
                    form.reportValidity();
                }
            });
        }
    </script>
</body>

</html>
