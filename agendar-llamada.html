<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://calendly.com https://assets.calendly.com; frame-src https://calendly.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <title>Agendar llamada - Automanize</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFAB00",
                        "primary-hover": "#E69900",
                        "background-light": "#fcfcfb",
                        "background-dark": "#0a0a0a",
                        "surface-light": "#ffffff",
                        "surface-dark": "#141414",
                        "text-main": "#181811",
                        "text-muted": "#6b6b5f"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Spline Sans", sans-serif;
        }
    </style>
</head>

<body class="bg-background-light text-text-main overflow-x-hidden font-display">
    <div class="relative flex flex-col min-h-screen w-full">
        <header class="w-full border-b border-[#e6e6db] bg-background-light/90 backdrop-blur-md">
            <div class="px-4 md:px-10 py-4 flex items-center justify-between max-w-[1200px] mx-auto w-full">
                <a href="index.html#inicio-principal" class="flex items-center gap-3" aria-label="Ir al inicio principal">
                    <div class="size-10 rounded-lg flex items-center justify-center shadow-md overflow-hidden">
                        <img src="assets/images/automanize.png" alt="Automanize Logo" class="w-full h-full object-cover" loading="lazy" />
                    </div>
                    <h1 class="text-text-main text-2xl font-bold tracking-tight">Automanize</h1>
                </a>
                <a href="index.html#inicio-principal" class="text-sm font-semibold hover:text-primary-hover transition-colors">Volver al inicio</a>
            </div>
        </header>

        <main class="flex-1 w-full max-w-[920px] mx-auto px-4 md:px-10 py-12 md:py-20">
            <section class="rounded-2xl border border-[#e6e6db] bg-surface-light p-6 md:p-10 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-wider text-primary mb-3">Paso 2 de 2</p>
                <h2 class="text-3xl md:text-4xl font-black leading-tight">Agenda tu llamada de consultoria gratuita</h2>
                <p class="mt-4 text-text-muted text-lg">
                    Ya tenemos tu informacion. Elige un horario y confirma la cita.
                </p>

                <div id="lead-summary" class="mt-6 rounded-xl border border-[#ececdc] bg-[#fafaf7] px-4 py-3 text-sm text-text-muted hidden"></div>

                <div class="mt-8 rounded-2xl border border-[#d8d8cc] bg-[#f8f8f4] p-3 md:p-5">
                    <div class="calendly-inline-widget" data-url="https://calendly.com/automanize/30min"
                        style="min-width: 320px; height: 760px;"></div>
                </div>
            </section>

            <div class="mt-6 flex justify-start">
                <a id="back-link" href="consultoria-gratuita.html"
                    class="inline-flex h-11 px-5 items-center justify-center rounded-full border border-[#d6d6ca] bg-white hover:bg-[#f5f5f1] text-text-main font-semibold transition-colors">
                    Volver atras
                </a>
            </div>
        </main>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sanitize = (value, maxLen = 300) => {
            if (!value) return "";
            return value.replace(/[\u0000-\u001F\u007F]/g, "").trim().slice(0, maxLen);
        };
        const nombre = sanitize(params.get("nombre"), 80);
        const email = sanitize(params.get("email"), 120);
        const dedicacion = sanitize(params.get("dedicacion"), 120);
        const problema = sanitize(params.get("problema"), 500);
        const backLink = document.getElementById("back-link");

        const summary = document.getElementById("lead-summary");
        if (summary && (nombre || email || dedicacion || problema)) {
            const addLine = (label, value) => {
                const row = document.createElement("div");
                const strong = document.createElement("strong");
                strong.textContent = `${label}: `;
                const text = document.createTextNode(value);
                row.appendChild(strong);
                row.appendChild(text);
                summary.appendChild(row);
            };

            if (nombre) addLine("Nombre", nombre);
            if (email) addLine("Email", email);
            if (dedicacion) addLine("A qué te dedicas", dedicacion);
            if (problema) addLine("Problema a solucionar", problema);
            summary.classList.remove("hidden");
        }

        if (backLink) {
            const safeParams = new URLSearchParams();
            if (nombre) safeParams.set("nombre", nombre);
            if (email) safeParams.set("email", email);
            if (dedicacion) safeParams.set("dedicacion", dedicacion);
            if (problema) safeParams.set("problema", problema);

            if (safeParams.toString()) {
                backLink.href = `consultoria-gratuita.html?${safeParams.toString()}`;
            }
        }
    </script>
    <script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</body>

</html>
