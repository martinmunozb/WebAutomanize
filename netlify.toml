[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY,STRIPE_PRICE_MENSUAL,STRIPE_PRICE_ANUAL,SUPABASE_SERVICE_KEY,SUPABASE_URL,SUPABASE_BUCKET,SUPABASE_FILE,STRIPE_WEBHOOK_SECRET_TRIAL,GMAIL_SENDER_USER,GMAIL_SENDER_APP_PASSWORD,NOTIFY_EMAIL_TO"

[[redirects]]
  from = "/radar.html"
  to = "https://captador.automanize.com/"
  status = 301
  force = true

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"
