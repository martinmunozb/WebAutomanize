<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Altas de agencia — Automanize</title>
<link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-1:    #F8EFDC;
    --bg-2:    #F1E2C4;
    --card:    #FFFDF8;
    --border:  #ECE0C4;
    --accent:  #DE9F26;
    --acc-h:   #C4841B;
    --ink:     #211C15;
    --text:    #3A3226;
    --muted:   #96876A;
    --light:   #C9BC9C;
    --red:     #C0392B;
    --green:   #2E8B57;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-1);
    background-image:
      radial-gradient(1000px circle at 12% -10%, rgba(222,159,38,0.16), transparent 60%),
      radial-gradient(800px circle at 110% 15%, rgba(222,159,38,0.10), transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    color: var(--text);
  }
  a { color: inherit; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border); border-radius: 24px;
    padding: 40px 34px; box-shadow: 0 40px 90px rgba(60,42,10,0.18), 0 10px 28px rgba(60,42,10,0.08);
  }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .login-logo-mark {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--acc-h));
    color: #fff; font-weight: 800; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(196,132,27,0.35);
  }
  .login-logo-text { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .login-title {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 700; font-size: 24px; color: var(--ink); margin-bottom: 6px;
  }
  .login-sub { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 26px; }

  label.field-label {
    display: block; font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
  }
  input, textarea {
    width: 100%; padding: 12px 13px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit; color: var(--ink); background: #FFFEFB;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(222,159,38,0.18); }
  .field { margin-bottom: 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--acc-h)); color: #241a06; width: 100%; padding: 14px;
    box-shadow: 0 12px 26px rgba(196,132,27,0.32); font-weight: 800;
  }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.05); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--acc-h)); color: #241a06; font-weight: 800;
    box-shadow: 0 12px 26px rgba(196,132,27,0.32);
  }
  .btn-accent:hover:not(:disabled) { filter: brightness(1.05); }
  .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--ink); }
  .btn-sm { padding: 8px 13px; font-size: 12.5px; border-radius: 9px; }

  .alert { padding: 11px 13px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
  .alert-ok  { background: #eef6ec; border: 1.5px solid #cfe6c8; color: #2e6b2f; }
  .alert-err { background: #fbeceb; border: 1.5px solid #edc9c5; color: #9a3b32; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(36,26,6,0.3);
    border-top-color: #241a06; border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; }
  header.topbar {
    position: sticky; top: 0; z-index: 20; background: rgba(255,253,248,0.9); backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 64px;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .topbar-logo-mark {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--acc-h));
    color: #fff; font-weight: 800; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-logo-text { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .topbar-tag { font-family: 'Fraunces', serif; font-style: italic; font-weight: 700; font-size: 15px; color: var(--ink); margin-left: 6px; padding-left: 12px; border-left: 1px solid var(--border); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .user-chip { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%; background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .user-email { color: var(--muted); font-size: 11.5px; }

  main.content { max-width: 1080px; margin: 0 auto; padding: 28px 20px 80px; }

  .tab-pills { display: flex; gap: 6px; background: rgba(222,159,38,0.12); padding: 5px; border-radius: 12px; width: fit-content; margin-bottom: 22px; }
  .pill-btn {
    padding: 9px 16px; border-radius: 9px; border: none; background: transparent;
    font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .pill-btn.active { background: var(--card); color: var(--ink); box-shadow: 0 4px 10px rgba(60,42,10,0.1); }

  .panel { display: none; }
  .panel.active { display: block; }

  table.data-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(60,42,10,0.08); }
  table.data-table th {
    text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.04em; padding: 13px 14px; background: #FBF5E8; border-bottom: 1px solid var(--border);
  }
  table.data-table td { padding: 13px 14px; font-size: 13.5px; color: var(--text); border-bottom: 1px solid #F4ECDA; vertical-align: top; }
  table.data-table tr:last-child td { border-bottom: none; }
  table.data-table tr:hover td { background: #FBF6EA; }
  .status-tag {
    display: inline-block; padding: 3px 9px; border-radius: 7px; font-size: 11.5px; font-weight: 700;
  }
  .status-pendiente { background: #FBF0CE; color: #8a5a10; }
  .status-usado { background: #e2f0df; color: #2e6b2f; }
  .archivo-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: var(--acc-h); text-decoration: none; margin-right: 8px; }
  .archivo-link:hover { text-decoration: underline; }
  .no-archivos { color: var(--light); font-size: 12px; }

  .empty-state { text-align: center; padding: 48px 16px; color: var(--light); font-size: 13px; }
  .empty-state .icon { font-size: 30px; margin-bottom: 10px; }
  .loading-block { text-align: center; padding: 60px 20px; color: var(--light); font-size: 13px; }
  .spin-lg { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }

  .card-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 26px 26px; margin-bottom: 22px; max-width: 460px; box-shadow: 0 20px 50px rgba(60,42,10,0.08); }
  .card-box h3 { font-family: 'Fraunces', serif; font-style: italic; font-weight: 700; font-size: 19px; color: var(--ink); margin-bottom: 18px; }

  .link-box {
    display: flex; align-items: center; gap: 8px; background: #FBF5E8; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-top: 6px;
  }
  .link-box input { border: none; background: transparent; padding: 0; font-size: 12.5px; }
  .link-box input:focus { box-shadow: none; }

  @media (max-width: 640px) {
    table.data-table thead { display: none; }
    table.data-table, table.data-table tbody, table.data-table tr, table.data-table td { display: block; width: 100%; }
    table.data-table tr { padding: 10px 14px; border-bottom: 1px solid #F4ECDA; }
    table.data-table td { padding: 3px 0; border: none; }
    table.data-table td[data-label]::before { content: attr(data-label); font-weight: 700; color: var(--muted); font-size: 10.5px; text-transform: uppercase; display: block; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">A</div>
      <span class="login-logo-text">Automanize · Nize</span>
    </div>
    <div class="login-title">Altas de agencia</div>
    <div class="login-sub">Inicia sesión para ver las fichas recibidas y generar enlaces.</div>
    <div id="loginAlertErr" class="alert alert-err"></div>
    <form id="loginForm" onsubmit="return false;">
      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" id="loginEmail" autocomplete="username" required />
      </div>
      <div class="field">
        <label class="field-label">Contraseña</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn" onclick="doLogin()">Iniciar sesión</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <a href="https://automanize.com" class="topbar-logo">
      <div class="topbar-logo-mark">A</div>
      <span class="topbar-logo-text">Automanize · Nize</span>
    </a>
    <span class="topbar-tag" style="margin-right:auto">Altas de agencia</span>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-email" id="userEmail">—</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <main class="content">
    <div class="tab-pills">
      <button class="pill-btn active" data-tab="solicitudes" onclick="switchTab('solicitudes')">Solicitudes recibidas</button>
      <button class="pill-btn" data-tab="tokens" onclick="switchTab('tokens')">Generar token</button>
    </div>

    <!-- SOLICITUDES -->
    <div class="panel active" id="panel-solicitudes">
      <div id="solicitudesWrap"></div>
    </div>

    <!-- GENERAR TOKEN -->
    <div class="panel" id="panel-tokens">
      <div class="card-box">
        <h3>Nuevo enlace de alta</h3>
        <div id="tokenAlertErr" class="alert alert-err"></div>
        <div class="field">
          <label class="field-label">Nombre de la agencia</label>
          <input type="text" id="tNombreAgencia" placeholder="Ej. InvictaRent" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="field-label">Email de contacto (opcional)</label>
          <input type="email" id="tEmail" placeholder="contacto@agencia.com" />
        </div>
        <button class="btn btn-accent" style="width:100%;margin-top:16px" id="btnCrearToken" onclick="crearToken()">Generar enlace</button>
        <div id="nuevoLinkWrap" style="display:none;margin-top:16px">
          <label class="field-label">Enlace para enviar al cliente</label>
          <div class="link-box">
            <input type="text" id="nuevoLinkInput" readonly />
            <button class="btn btn-ghost btn-sm" onclick="copiarLink()">Copiar</button>
          </div>
        </div>
      </div>

      <div id="tokensWrap"></div>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL = 'https://edjugpekcntzvqaskbmc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkanVncGVrY250enZxYXNrYm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTc0NjksImV4cCI6MjA4NzY5MzQ2OX0.JOyutVcE_OB5Bszuz12_aTBK4RRzD-a79QQ3uLS7IyA';
  const { createClient } = window.supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'onboarding' } });

  let currentUser = null;
  let respuestas = [];
  let tokens = [];

  // ────────── AUTH ──────────
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Entrando...';
    hideEl('loginAlertErr');
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
    if (error) { showErr('loginAlertErr', 'Email o contraseña incorrectos.'); return; }
    onAuthenticated(data.user);
  }

  async function doLogout() {
    await db.auth.signOut();
    location.reload();
  }

  function onAuthenticated(user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userAvatar').textContent = user.email.trim().charAt(0).toUpperCase();
    loadData();
  }

  // ────────── DATA ──────────
  async function loadData() {
    document.getElementById('solicitudesWrap').innerHTML = loadingBlock();
    document.getElementById('tokensWrap').innerHTML = '';

    const [rRes, tRes] = await Promise.all([
      db.from('respuestas').select('*').order('created_at', { ascending: false }),
      db.from('tokens').select('*').order('created_at', { ascending: false }),
    ]);

    if (rRes.error) {
      document.getElementById('solicitudesWrap').innerHTML = emptyState('⚠️', 'Error al cargar las solicitudes.');
    } else {
      respuestas = rRes.data || [];
      renderSolicitudes();
    }

    tokens = tRes.data || [];
    renderTokens();
  }

  function renderSolicitudes() {
    const wrap = document.getElementById('solicitudesWrap');
    if (!respuestas.length) { wrap.innerHTML = emptyState('📭', 'Todavía no ha llegado ninguna ficha.'); return; }

    wrap.innerHTML = `<table class="data-table">
      <thead><tr>
        <th>Agencia</th><th>Fiscal</th><th>Persona</th><th>Contacto</th><th>IBAN</th><th>Fecha</th><th>Logo</th><th>Archivos</th><th>Notas</th><th>Recibido</th>
      </tr></thead>
      <tbody>
        ${respuestas.map(r => `
          <tr>
            <td data-label="Agencia"><strong>${escHtml(r.nombre_agencia)}</strong>${r.razon_social ? `<div style="font-size:11.5px;color:#999">${escHtml(r.razon_social)}</div>` : ''}</td>
            <td data-label="Fiscal">${r.nif ? escHtml(r.nif) : '<span class="no-archivos">—</span>'}</td>
            <td data-label="Persona">${escHtml(r.persona_rellena)}</td>
            <td data-label="Contacto">${escHtml(r.email_contacto || '—')}${r.telefono_admin ? `<div style="font-size:11.5px;color:#999">${escHtml(r.telefono_admin)}</div>` : ''}${r.telefono_whatsapp ? `<div style="font-size:11.5px;color:#999">WA: ${escHtml(r.telefono_whatsapp)}</div>` : ''}</td>
            <td data-label="IBAN">${r.iban ? escHtml(r.iban) : '<span class="no-archivos">—</span>'}</td>
            <td data-label="Fecha">${fmtDate(r.fecha)}</td>
            <td data-label="Logo">${r.logo_path ? `<a class="archivo-link" href="#" onclick="verArchivo('${escJs(r.logo_path)}');return false;">🖼️ Ver</a>` : '<span class="no-archivos">—</span>'}</td>
            <td data-label="Archivos">${renderArchivos(r.archivos)}</td>
            <td data-label="Notas">${r.notas ? escHtml(r.notas) : '<span class="no-archivos">—</span>'}</td>
            <td data-label="Recibido">${fmtDateTime(r.created_at)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
  }

  function renderArchivos(archivos) {
    if (!archivos || !archivos.length) return '<span class="no-archivos">Sin archivos</span>';
    return archivos.map(a => `<a class="archivo-link" href="#" onclick="verArchivo('${escJs(a.path)}');return false;">📎 ${escHtml(a.nombre)}</a>`).join('<br/>');
  }

  async function verArchivo(path) {
    const { data, error } = await db.storage.from('onboarding-archivos').createSignedUrl(path, 3600);
    if (error || !data?.signedUrl) { alert('No se pudo abrir el archivo.'); return; }
    window.open(data.signedUrl, '_blank');
  }

  function renderTokens() {
    const wrap = document.getElementById('tokensWrap');
    if (!tokens.length) { wrap.innerHTML = ''; return; }

    wrap.innerHTML = `<table class="data-table" style="margin-top:8px">
      <thead><tr>
        <th>Agencia</th><th>Contacto</th><th>Estado</th><th>Creado</th><th>Por</th><th></th>
      </tr></thead>
      <tbody>
        ${tokens.map(t => `
          <tr>
            <td data-label="Agencia"><strong>${escHtml(t.nombre_agencia)}</strong></td>
            <td data-label="Contacto">${escHtml(t.email_contacto || '—')}</td>
            <td data-label="Estado"><span class="status-tag ${t.usado ? 'status-usado' : 'status-pendiente'}">${t.usado ? 'Usado' : 'Pendiente'}</span></td>
            <td data-label="Creado">${fmtDateTime(t.created_at)}</td>
            <td data-label="Por">${escHtml(t.creado_por_email || '—')}</td>
            <td data-label="">${t.usado
              ? '<span class="no-archivos">—</span>'
              : `<button class="btn btn-ghost btn-sm" onclick="eliminarToken('${escJs(t.id)}', '${escJs(t.nombre_agencia)}')">🗑️ Borrar</button>`}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
  }

  // ────────── TABS ──────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-pills .pill-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ────────── GENERAR TOKEN ──────────
  async function crearToken() {
    const nombreAgencia = document.getElementById('tNombreAgencia').value.trim();
    const email = document.getElementById('tEmail').value.trim();
    hideEl('tokenAlertErr');
    if (!nombreAgencia) { showErr('tokenAlertErr', 'Escribe el nombre de la agencia.'); return; }

    const btn = document.getElementById('btnCrearToken');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Generando...';

    const { data, error } = await db.rpc('crear_token', {
      p_nombre_agencia: nombreAgencia,
      p_email_contacto: email || null,
    });

    btn.disabled = false;
    btn.textContent = 'Generar enlace';

    if (error) { showErr('tokenAlertErr', 'No se pudo generar el token: ' + error.message); return; }

    const link = `${location.origin}/alta-agencia.html?token=${data}`;
    document.getElementById('nuevoLinkInput').value = link;
    document.getElementById('nuevoLinkWrap').style.display = 'block';
    document.getElementById('tNombreAgencia').value = '';
    document.getElementById('tEmail').value = '';

    await loadData();
  }

  async function eliminarToken(id, nombre) {
    if (!confirm(`¿Borrar el enlace de "${nombre}"? Esta acción no se puede deshacer.`)) return;
    const { error } = await db.from('tokens').delete().eq('id', id);
    if (error) { alert('No se pudo borrar: ' + error.message); return; }
    await loadData();
  }

  function copiarLink() {
    const input = document.getElementById('nuevoLinkInput');
    input.select();
    navigator.clipboard?.writeText(input.value).catch(() => document.execCommand('copy'));
  }

  // ────────── HELPERS ──────────
  function fmtDate(d) { return new Date(d + 'T00:00:00').toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }); }
  function fmtDateTime(d) { return new Date(d).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function escJs(s) { return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
  function loadingBlock() { return `<div class="loading-block"><div class="spin-lg"></div>Cargando...</div>`; }
  function emptyState(icon, msg) { return `<div class="empty-state"><div class="icon">${icon}</div>${msg}</div>`; }
  function showErr(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
  function hideEl(id) { document.getElementById(id).style.display = 'none'; }

  // ────────── INIT ──────────
  (async function init() {
    const { data } = await db.auth.getSession();
    if (data.session?.user) onAuthenticated(data.session.user);
  })();

  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
